services:
  - type: web
    name: apk-to-aab-converter
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 10